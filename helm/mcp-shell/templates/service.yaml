apiVersion: v1
kind: Service
metadata:
  name: {{ include "mcp-shell.fullname" . }}
  labels:
    {{- include "mcp-shell.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    {{- include "mcp-shell.selectorLabels" . | nindent 4 }}
