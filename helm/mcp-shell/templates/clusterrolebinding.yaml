{{- if .Values.serviceAccount.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "mcp-shell.fullname" . }}-readonly
  labels:
    {{- include "mcp-shell.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "mcp-shell.fullname" . }}-readonly
subjects:
  - kind: ServiceAccount
    name: {{ include "mcp-shell.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
